name: Build NEURAL BOOST X

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_15.2.app
        
      - name: Setup Project Structure
        run: |
          mkdir -p NEURAL_BOOST_X.xcodeproj
          # Minimal project file generation logic could go here if needed, 
          # but usually we'd have the .xcodeproj in the repo.
          
      - name: Build for Simulator
        run: |
          xcodebuild build \
            -scheme NEURAL_BOOST_X \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.2' \
            -configuration Debug
            
      - name: Archive and Export (IPA)
        # Note: Requires Signing Certificates/Profiles in Secrets
        if: github.event_with_type == 'push'
        run: |
          echo "Building unsigned .xcarchive for artifacts..."
          xcodebuild archive -project NEURAL_BOOST_X.xcodeproj -scheme NEURAL_BOOST_X -archivePath NEURAL_BOOST_X.xcarchive

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: neural-boost-x-build
          path: NEURAL_BOOST_X.xcarchive
