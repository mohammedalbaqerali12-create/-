name: Build NEURAL BOOST X (Capacitor Native)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build iOS IPA
    runs-on: macos-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          
      - name: Install Dependencies
        run: npm install
        
      - name: Build Web Application
        run: npm run build
        
      - name: Capacitor Sync
        run: |
          npx cap add ios
          npx cap sync ios
          
      - name: Build iOS Archive
        run: |
          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -archivePath NEURAL_BOOST_X.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO
            
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: neural-boost-x-capacitor-ios
          path: NEURAL_BOOST_X.xcarchive
