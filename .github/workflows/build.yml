name: Build NEURAL BOOST X (Capacitor Native)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build iOS IPA
    runs-on: macos-14
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Build Web Application
        run: npm run build
        
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/App/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/App/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Capacitor Sync
        run: |
          if [ ! -d "ios" ]; then npx cap add ios; fi
          npx cap sync ios
          
      - name: Build iOS Archive
        run: |
          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -archivePath NEURAL_BOOST_X.xcarchive \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO
            
      - name: Package IPA
        run: |
          mkdir Payload
          cp -r NEURAL_BOOST_X.xcarchive/Products/Applications/App.app Payload/
          zip -r NEURAL_BOOST_X.ipa Payload

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: neural-boost-x-ipa
          path: NEURAL_BOOST_X.ipa
